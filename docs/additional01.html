    <main class="markdown-body">

      <h1 data-number="1" id="補講"><span class="header-section-number">1</span> 補講</h1>
      <p>本校では、中間試験 (≠前期末試験、学年末試験)
      は、授業回としてカウントされ、<strong>中間試験期間に試験を実施しない科目では、補講を実施する必要があります</strong>。</p>
      <p>この資料は、前期中間試験分の補講 (オンデマンド実施) となります。以下の指示を参考に、各自で
      90 分相当の自学自習に取り組んでください。出欠確認はありません。</p>
      <p>(以下、作成中)</p>

    <footer class="markdown-body">
      <p><a href="https://takeshiwada1980.github.io/Programming1-2026/">講義資料のIndexに移動</a></p>
    </footer>

    <script>
      window.onload = function () {
        // ナビゲーション関連
        let openBtn = document.getElementsByClassName("openbtn")[0];
        let navPnl = document.getElementById("g-nav");
        openBtn.onclick = () => {
          openBtn.classList.toggle("active");
          navPnl.classList.toggle("panelactive");
        };

        let items = navPnl.getElementsByTagName("a");
        Array.from(items).forEach((item) => {
          item.onclick = () => {
            openBtn.classList.toggle("active");
            navPnl.classList.toggle("panelactive");
          };
        });

        // マスク処理
        let maskedSpans = document.getElementsByClassName("masked");
        Array.from(maskedSpans).forEach((span) => {
          span.onclick = () => {
            span.classList.toggle("open");
          };
        });

        // 吹き出しコンポーネントの補完
        function updateBalloonFrame(body) {
          var svg = body.querySelector(":scope > .balloon-frame");
          var path = body.querySelector(":scope > .balloon-frame .balloon-frame-shape");
          if (!svg || !path) return;

          var rect = body.getBoundingClientRect();
          var style = getComputedStyle(body);
          var width = Math.max(1, Math.ceil(rect.width));
          var height = Math.max(1, Math.ceil(rect.height));

          var stroke = parseFloat(style.getPropertyValue("--balloon-stroke-width")) || 2;
          var radius = parseFloat(style.getPropertyValue("--balloon-radius")) || 18;
          var tailWidth = parseFloat(style.getPropertyValue("--balloon-tail-width")) || 26;
          var tailTop = parseFloat(style.getPropertyValue("--balloon-tail-top")) || 18;
          var tailBase = parseFloat(style.getPropertyValue("--balloon-tail-base")) || 20;
          var tailTipInset =
            parseFloat(style.getPropertyValue("--balloon-tail-tip-inset")) || 3;
          var s2 = stroke * 0.5;
          var left = tailWidth + s2;
          var top = s2;
          var right = width - s2;
          var bottom = height - s2;
          var safeRadius = Math.min(radius, (right - left) * 0.5, (bottom - top) * 0.5);
          var baseTop = Math.max(
            top + safeRadius + 4,
            Math.min(bottom - safeRadius - tailBase - 4, tailTop),
          );
          var baseBottom = Math.min(bottom - safeRadius - 4, baseTop + tailBase);
          var tipX = Math.max(s2, tailTipInset);
          var tipY = (baseTop + baseBottom) * 0.5;
          var d = [
            "M",
            left + safeRadius,
            top,
            "H",
            right - safeRadius,
            "A",
            safeRadius,
            safeRadius,
            0,
            0,
            1,
            right,
            top + safeRadius,
            "V",
            bottom - safeRadius,
            "A",
            safeRadius,
            safeRadius,
            0,
            0,
            1,
            right - safeRadius,
            bottom,
            "H",
            left + safeRadius,
            "A",
            safeRadius,
            safeRadius,
            0,
            0,
            1,
            left,
            bottom - safeRadius,
            "V",
            baseBottom,
            "L",
            tipX,
            tipY,
            "L",
            left,
            baseTop,
            "V",
            top + safeRadius,
            "A",
            safeRadius,
            safeRadius,
            0,
            0,
            1,
            left + safeRadius,
            top,
            "Z",
          ].join(" ");

          svg.setAttribute("viewBox", "0 0 " + width + " " + height);
          path.setAttribute("d", d);
        }

        document.querySelectorAll("div.balloon").forEach(function (div) {
          if (div.querySelector(":scope > .balloon-body")) return;

          var hasContent = Array.from(div.childNodes).some(function (node) {
            return node.nodeType !== Node.TEXT_NODE || node.textContent.trim() !== "";
          });
          if (!hasContent) return;

          var classNames = Array.from(div.classList);
          var charClass = classNames.find(function (name) {
            return /^char-\d\d/.test(name) && name.length === 7;
          });
          var faceClass = classNames.find(function (name) {
            return /^face-\d\d/.test(name) && name.length === 7;
          });

          var contentNodes = Array.from(div.childNodes);
          var body = document.createElement("div");
          body.className = "balloon-body";

          var frame = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "svg",
          );
          frame.setAttribute("aria-hidden", "true");
          frame.classList.add("balloon-frame");

          var framePath = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "path",
          );
          framePath.classList.add("balloon-frame-shape");
          frame.appendChild(framePath);

          var bubble = document.createElement("div");
          bubble.className = "balloon-bubble";

          var content = document.createElement("div");
          content.className = "balloon-content";
          contentNodes.forEach(function (node) {
            content.appendChild(node);
          });

          bubble.appendChild(content);
          body.appendChild(frame);
          body.appendChild(bubble);

          if (charClass && faceClass) {
            var figure = document.createElement("div");
            figure.className = "balloon-figure";

            var avatar = document.createElement("div");
            avatar.className = "balloon-avatar";

            var image = document.createElement("img");
            var avatarBasePath = "figs/balloon/" + charClass + "/" + faceClass;
            var triedGifAvatar = false;
            image.src = avatarBasePath + ".png";
            image.alt = "";
            image.loading = "lazy";
            image.decoding = "async";
            image.addEventListener("error", function () {
              if (!triedGifAvatar) {
                triedGifAvatar = true;
                image.src = avatarBasePath + ".gif";
                return;
              }

              div.classList.add("balloon-no-avatar");
              if (figure.parentNode) {
                figure.remove();
              }
            });

            avatar.appendChild(image);
            figure.appendChild(avatar);
            div.appendChild(figure);
          } else {
            div.classList.add("balloon-no-avatar");
          }

          div.appendChild(body);
          updateBalloonFrame(body);

          if (window.ResizeObserver) {
            var observer = new ResizeObserver(function () {
              updateBalloonFrame(body);
            });
            observer.observe(body);
          }
        });

        // data-startfrom 属性の行番号カウンタのリセット
        document.querySelectorAll("div.sourceCode").forEach(function (div) {
          var startFrom = div.getAttribute("data-startfrom");
          if (startFrom != null) {
            div.style.counterReset = "pg-line " + (startFrom - 1);
          }
        });

        // コピーボタンの追加
        document.querySelectorAll("div.sourceCode").forEach(function (div) {
          var btn = document.createElement("button");
          btn.className = "copy-btn";
          btn.title = "コードをコピー";
          btn.innerHTML = '<i class="fa-regular fa-copy"></i>';
          btn.addEventListener("click", function () {
            var codeEl = div.querySelector("code");
            if (!codeEl) return;
            navigator.clipboard.writeText(codeEl.innerText).then(function () {
              btn.innerHTML = '<i class="fa-solid fa-check"></i>';
              setTimeout(function () {
                btn.innerHTML = '<i class="fa-regular fa-copy"></i>';
              }, 1500);
            });
          });
          div.appendChild(btn);
        });

      };
    </script>
